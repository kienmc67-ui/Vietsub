<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Director Vision - All In One</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { background: #090d16; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; }
        .upload-zone { border: 2px dashed #38bdf8; padding: 20px; text-align: center; margin: 10px 0; border-radius: 10px; cursor: pointer; }
        .video-box { position: relative; width: 100%; background: #000; margin-top: 10px; overflow: hidden; }
        video { width: 100%; display: block; }
        #overlay { position: absolute; bottom: 10%; left: 5%; width: 90%; height: 50px; background: rgba(0,0,0,0.5); border: 2px dashed #38bdf8; z-index: 10; cursor: move; touch-action: none; }
        #subText { position: absolute; bottom: 10%; width: 100%; text-align: center; color: yellow; font-size: 18px; font-weight: bold; text-shadow: 1px 1px 2px #000; z-index: 20; pointer-events: none; }
        #log { padding: 10px; background: #1f2937; margin-top: 10px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Director Vision</h2>
    <div class="upload-zone" onclick="document.getElementById('videoUpload').click()">
        <p>📂 CHẠM ĐỂ CHỌN VIDEO</p>
        <input type="file" id="videoUpload" accept="video/*" style="display:none;">
    </div>
    
    <div class="video-box">
        <video id="mainVideo" controls playsinline></video>
        <div id="overlay"></div>
        <div id="subText">Đang chờ...</div>
    </div>
    
    <div id="log">Trạng thái: Đang tải AI...</div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('mainVideo');
    const input = document.getElementById('videoUpload');
    const overlay = document.getElementById('overlay');
    const subText = document.getElementById('subText');
    const log = document.getElementById('log');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let worker;

    // 1. Tải OCR
    async function setupOCR() {
        worker = await Tesseract.createWorker('chi_sim');
        log.innerText = "✅ AI Sẵn sàng. Chọn Video!";
    }
    setupOCR();

    // 2. Xử lý Video
    input.addEventListener('change', (e) => {
        const file = e.target.files[0];
        video.src = URL.createObjectURL(file);
        video.load();
        log.innerText = "🎬 Đã load video. Bấm Play!";
    });

    // 3. Logic Quét & Dịch
    video.addEventListener('play', () => {
        const interval = setInterval(async () => {
            if (video.paused || video.ended) return;
            
            // Lấy tọa độ vùng quét
            const rect = overlay.getBoundingClientRect();
            const vRect = video.getBoundingClientRect();
            
            canvas.width = rect.width;
            canvas.height = rect.height;
            
            ctx.drawImage(video, 
                (rect.left - vRect.left) * (video.videoWidth / vRect.width), 
                (rect.top - vRect.top) * (video.videoHeight / vRect.height),
                rect.width * (video.videoWidth / vRect.width), 
                rect.height * (video.videoHeight / vRect.height),
                0, 0, canvas.width, canvas.height
            );

            const { data: { text } } = await worker.recognize(canvas);
            const clean = text.replace(/[^a-zA-Z\u4e00-\u9fa5]/g, ' ').trim();
            
            if (clean.length > 2) {
                log.innerText = "🔍: " + clean;
                translate(clean);
            }
        }, 1000);
    });

    // 4. Dịch
    async function translate(text) {
        try {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=vi&dt=t&q=${encodeURIComponent(text)}`);
            const data = await res.json();
            const trans = data[0][0][0];
            subText.innerText = trans;
            
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(trans);
            msg.lang = 'vi-VN';
            window.speechSynthesis.speak(msg);
        } catch(e) { log.innerText = "Lỗi dịch!"; }
    }

    // 5. Kéo thả overlay
    let isDown = false;
    overlay.onpointerdown = () => isDown = true;
    window.onpointerup = () => isDown = false;
    window.onpointermove = (e) => {
        if (!isDown) return;
        overlay.style.top = (e.clientY - 25) + 'px';
        overlay.style.left = (e.clientX - (overlay.offsetWidth/2)) + 'px';
    };
</script>
</body>
</html>
