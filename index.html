<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Director Vision Mobile V3</title>
    <!-- Thư viện OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- File CSS riêng biệt -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>AI Director Vision Mobile V3</h2>
        <div class="subtitle">Bản sửa lỗi: Nhận diện ngôn ngữ chuẩn xác & Chống dịch nhiễu</div>

        <div class="upload-zone" id="dropZone">
            <p id="uploadText">👉 CHẠM VÀO ĐÂY ĐỂ CHỌN VIDEO 👈</p>
        </div>

        <div class="config-grid">
            <div class="select-box">
                <label>Chữ gốc trên phim</label>
                <select id="ocrLang">
                    <option value="chi_sim">Tiếng Trung (Giản thể)</option>
                    <option value="eng">Tiếng Anh (English)</option>
                    <option value="jpn">Tiếng Nhật</option>
                </select>
            </div>

            <div class="select-box">
                <label>Giọng Đọc Tiếng Việt</label>
                <select id="voiceSelect">
                    <option value="">Đang nạp giọng chuẩn hệ thống...</option>
                </select>
            </div>
            
            <div class="select-box">
                <label>Tốc độ giọng đọc AI</label>
                <select id="ttsRate">
                    <option value="1.25">1.25x (Khuyên dùng)</option>
                    <option value="1.0">1.0x (Bình thường)</option>
                    <option value="1.4">1.4x (Đọc nhanh)</option>
                </select>
            </div>

            <div class="sliders-wrapper">
                <label>Cân chỉnh thanh xám bằng thanh trượt (Hoặc dùng tay kéo trực tiếp)</label>
                <div class="control-sliders">
                    <div class="slider-group">
                        <span>Vị trí đứng Y (%):</span>
                        <input type="range" id="sliderY" min="0" max="90" value="12">
                    </div>
                    <div class="slider-group">
                        <span>Độ cao thanh che (px):</span>
                        <input type="range" id="sliderHeight" min="25" max="150" value="50">
                    </div>
                </div>
            </div>
        </div>

        <div class="video-player-wrapper">
            <video id="mainVideo" controls playsinline></video>
            <div class="draggable-blur-layer" id="blurLayer">
                <div class="resize-handle" id="resizeHandle"></div>
            </div>
            <div class="live-vietsub-overlay" id="liveSubText">Đang chờ video...</div>
        </div>

        <div class="status-bar">
            <span id="logOcr">AI OCR Status: Đang chờ file...</span>
            <span class="status-active">✓ Chế độ tự động dịch và phát âm thanh đang bật</span>
        </div>
    </div>

    <canvas id="captureCanvas"></canvas>

    <!-- File Logic riêng biệt -->
    <script src="app.js"></script>
</body>
</html>
