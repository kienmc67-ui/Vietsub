<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Director Vision Mobile V3</title>
    <!-- Thư viện AI đọc chữ hình ảnh -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #090d16;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            background: #111827;
            width: 100%;
            max-width: 700px;
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            border: 1px solid #1f2937;
        }

        h2 {
            text-align: center;
            color: #38bdf8;
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 12px;
            margin-bottom: 15px;
        }

        /* Vùng thả/chọn file tối ưu mobile */
        .upload-zone {
            border: 2px dashed #0284c7;
            background: #030712;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .upload-zone p {
            font-size: 13px;
            font-weight: 600;
            color: #38bdf8;
        }
        #videoFileInput { display: none; }

        /* Bảng điều khiển Auto-Responsive cho Di Động */
        .config-grid {
            display: grid;
            grid-template-columns: 1fr; /* Mặc định 1 cột dọc trên điện thoại */
            gap: 12px;
            margin-bottom: 15px;
            background: #1f2937;
            padding: 12px;
            border-radius: 10px;
        }

        @media (min-width: 600px) {
            .config-grid {
                grid-template-columns: 1fr 1fr 1fr;
            }
            .sliders-wrapper {
                grid-column: span 3;
            }
        }

        .select-box { display: flex; flex-direction: column; }
        label {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        select {
            background: #030712;
            color: #f8fafc;
            border: 1px solid #4b5563;
            padding: 10px;
            border-radius: 8px;
            outline: none;
            font-size: 13px;
        }

        .sliders-wrapper {
            border-top: 1px solid #374151;
            padding-top: 10px;
            margin-top: 2px;
        }

        .control-sliders {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .slider-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #cbd5e1;
        }
        .slider-group input { flex: 1; accent-color: #38bdf8; height: 6px; }

        /* KHU VỰC KHUNG VIDEO CHUẨN ĐỒNG BỘ */
        .video-player-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid #374151;
        }

        video { 
            width: 100%; 
            display: block; 
            height: auto; 
        }

        /* THANH CHE PHỤ ĐỀ HỖ TRỢ CẢ CHUỘT VÀ CẢM ỨNG TAY */
        .draggable-blur-layer {
            position: absolute;
            bottom: 12%;
            left: 2%;
            width: 96%;
            height: 50px;
            background: rgba(75, 85, 99, 0.98); 
            border: 1.5px dashed #ffffff;
            border-radius: 6px;
            cursor: move;
            z-index: 10;
            touch-action: none; /* Chặn trình duyệt cuộn trang khi đang kéo thanh này */
        }

        .resize-handle {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: #ffffff;
            cursor: ns-resize;
            opacity: 0.7;
        }

        /* CHỮ PHỤ ĐỀ VIỆTSUB TO RÕ RÀNG */
        .live-vietsub-overlay {
            position: absolute;
            bottom: 13%;
            left: 2%;
            width: 96%;
            text-align: center;
            color: #ffffff; 
            font-size: 16px; 
            font-weight: 800;
            line-height: 1.3;
            z-index: 20;
            pointer-events: none;
            text-shadow: 
                2px 2px 0px #000, 
               -2px -2px 0px #000, 
                2px -2px 0px #000, 
               -2px 2px 0px #000;
        }

        @media (min-width: 600px) {
            .live-vietsub-overlay { font-size: 22px; }
            .draggable-blur-layer { height: 65px; }
        }

        .status-bar {
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: #030712;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            border: 1px solid #1f2937;
        }
        .status-active { color: #34d399; font-weight: bold; }
        
        #captureCanvas { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>AI Director Vision Mobile V3</h2>
        <div class="subtitle">Bản sửa lỗi: Hỗ trợ cảm ứng vuốt chạm kéo thả thanh xám trên điện thoại</div>

        <div class="upload-zone" id="dropZone">
            <p id="uploadText">👉 CHẠM VÀO ĐÂY ĐỂ CHỌN VIDEO 👈</p>
        </div>

        <div class="config-grid">
            <div class="select-box">
                <label>Chữ gốc trên phim</label>
                <select id="ocrLang">
                    <option value="eng">Tiếng Anh (English)</option>
                    <option value="chi_sim">Tiếng Trung</option>
                    <option value="jpn">Tiếng Nhật</option>
                </select>
            </div>

            <div class="select-box">
                <label>Giọng Đọc Tiếng Việt</label>
                <select id="voiceSelect">
                    <option value="">Đang nạp giọng chuẩn hệ thống...</option>
                </select>
            </div>
            
            <div class="select-box">
                <label>Tốc độ giọng đọc AI</label>
                <select id="ttsRate">
                    <option value="1.25">1.25x (Khuyên dùng)</option>
                    <option value="1.0">1.0x (Bình thường)</option>
                    <option value="1.4">1.4x (Đọc nhanh)</option>
                </select>
            </div>

            <div class="sliders-wrapper">
                <label>Cân chỉnh vị trí thanh xám bằng thanh trượt (Hoặc dùng tay kéo trực tiếp)</label>
                <div class="control-sliders">
                    <div class="slider-group">
                        <span>Vị trí đứng Y (%):</span>
                        <input type="range" id="sliderY" min="0" max="90" value="12">
                    </div>
                    <div class="slider-group">
                        <span>Độ cao thanh che (px):</span>
                        <input type="range" id="sliderHeight" min="25" max="150" value="50">
                    </div>
                </div>
            </div>
        </div>

        <!-- WORKSPACE VIDEO PLAYER -->
        <div class="video-player-wrapper">
            <video id="mainVideo" controls playsinline></video>
            
            <!-- Thanh màu xám che phủ xóa phụ đề gốc (Hỗ trợ kéo bằng tay) -->
            <div class="draggable-blur-layer" id="blurLayer">
                <div class="resize-handle" id="resizeHandle"></div>
            </div>
            
            <!-- Lớp hiển thị chữ phụ đề mới dịch rõ ràng đè lên trên -->
            <div class="live-vietsub-overlay" id="liveSubText">Đang chờ video...</div>
        </div>

        <div class="status-bar">
            <span id="logOcr">AI OCR Status: Đang chờ file...</span>
            <span class="status-active">✓ Chế độ tắt tiếng video gốc tự động đang bật</span>
        </div>
    </div>

    <canvas id="captureCanvas"></canvas>

    <script>
        const videoFileInput = document.createElement('input');
        videoFileInput.type = 'file';
        videoFileInput.accept = 'video/*';
        
        const dropZone = document.getElementById('dropZone');
        const uploadText = document.getElementById('uploadText');
        const mainVideo = document.getElementById('mainVideo');
        const blurLayer = document.getElementById('blurLayer');
        const liveSubText = document.getElementById('liveSubText');
        
        const sliderY = document.getElementById('sliderY');
        const sliderHeight = document.getElementById('sliderHeight');
        const ocrLangSelect = document.getElementById('ocrLang');
        const voiceSelect = document.getElementById('voiceSelect');
        const ttsRate = document.getElementById('ttsRate');
        const logOcr = document.getElementById('logOcr');
        
        const canvas = document.getElementById('captureCanvas');
        const ctx = canvas.getContext('2d');

        let ocrWorker = null;
        let scanTimer = null;
        let lastLoggedText = "";
        let isProcessingFrame = false;

        // LOAD GIỌNG ĐỌC MOBILE TỰ ĐỘNG
        function loadVoices() {
            if (!('speechSynthesis' in window)) return;
            const voices = window.speechSynthesis.getVoices();
            voiceSelect.innerHTML = '';
            const viVoices = voices.filter(v => v.lang.includes('vi') || v.lang.includes('VI'));
            
            if(viVoices.length > 0) {
                viVoices.forEach(v => {
                    let option = document.createElement('option');
                    option.value = v.name;
                    option.innerText = `Giọng Việt: ${v.name}`;
                    voiceSelect.appendChild(option);
                });
            } else {
                let option = document.createElement('option');
                option.value = "";
                option.innerText = "Giọng mặc định thiết bị";
                voiceSelect.appendChild(option);
            }
        }
        if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }
        setTimeout(loadVoices, 600);

        // KHỞI ĐỘNG AI OCR
        async function startOcrCore() {
            logOcr.innerText = "🤖 Đang tải bộ xử lý ảnh AI...";
            ocrWorker = await Tesseract.createWorker(ocrLangSelect.value);
            logOcr.innerText = "⚡ Hệ thống sẵn sàng! Bấm Play để dịch.";
        }
        startOcrCore();

        ocrLangSelect.addEventListener('change', async () => {
            if(ocrWorker) await ocrWorker.terminate();
            startOcrCore();
        });

        // Chọn Video
        dropZone.addEventListener('click', () => videoFileInput.click());
        videoFileInput.addEventListener('change', function() {
            if(this.files.length > 0) {
                mainVideo.src = URL.createObjectURL(this.files[0]);
                uploadText.innerHTML = `Đã nhận: <span style="color:#22c55e">${this.files[0].name}</span>`;
                mainVideo.muted = true;
            }
        });

        // THUẬT TOÁN ĐA CHẠM (TOUCH) & CHUỘT (MOUSE) CHO MOBILE VÀ PC
        let isDragging = false, isResizing = false, yStart, startBottom, startHeight;

        function getClientY(e) {
            return e.touches ? e.touches[0].clientY : e.clientY;
        }

        function actionStart(e, type) {
            if (type === 'resize') {
                isResizing = true;
                e.stopPropagation();
            } else {
                if (e.target.id === 'resizeHandle') return;
                isDragging = true;
            }
            yStart = getClientY(e);
            startBottom = parseInt(window.getComputedStyle(blurLayer).bottom, 10) || 0;
            startHeight = parseInt(window.getComputedStyle(blurLayer).height, 10) || 50;
            
            if(e.cancelable) e.preventDefault();
        }

        function actionMove(e) {
            if (!isDragging && !isResizing) return;
            
            let currentY = getClientY(e);
            let deltaY = yStart - currentY;

            if (isDragging) {
                let targetBottom = startBottom + deltaY;
                blurLayer.style.bottom = targetBottom + 'px';
                let maxH = mainVideo.offsetHeight || 1;
                sliderY.value = Math.min(90, Math.max(0, Math.round((targetBottom / maxH) * 100)));
            }
            if (isResizing) {
                let newH = startHeight + deltaY;
                if(newH > 20 && newH < 200) {
                    blurLayer.style.height = newH + 'px';
                    sliderHeight.value = newH;
                }
            }
            if(e.cancelable) e.preventDefault();
        }

        function actionEnd() { isDragging = false; isResizing = false; }

        // Gắn sự kiện chuột (PC)
        blurLayer.addEventListener('mousedown', (e) => actionStart(e, 'drag'));
        document.getElementById('resizeHandle').addEventListener('mousedown', (e) => actionStart(e, 'resize'));
        document.addEventListener('mousemove', actionMove);
        document.addEventListener('mouseup', actionEnd);

        // Gắn sự kiện cảm ứng ngón tay (Mobile)
        blurLayer.addEventListener('touchstart', (e) => actionStart(e, 'drag'), { passive: false });
        document.getElementById('resizeHandle').addEventListener('touchstart', (e) => actionStart(e, 'resize'), { passive: false });
        document.addEventListener('touchmove', actionMove, { passive: false });
        document.addEventListener('touchend', actionEnd);

        // Đồng bộ ngược từ thanh trượt input slider ra thanh xám
        sliderY.addEventListener('input', function() { blurLayer.style.bottom = this.value + '%'; });
        sliderHeight.addEventListener('input', function() { blurLayer.style.height = this.value + 'px'; });

        // DỊCH GOOGLE
        async function executeTranslation(rawText) {
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=vi&dt=t&q=${encodeURIComponent(rawText)}`;
                const response = await fetch(url);
                const result = await response.json();
                return result[0].map(item => item[0]).join('');
            } catch (err) { return rawText; }
        }

        // ĐỌC GIỌNG AI TIẾNG VIỆT
        function playTtsVoice(translatedText) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel(); 

            const utterance = new SpeechSynthesisUtterance(translatedText);
            utterance.lang = 'vi-VN';
            utterance.rate = parseFloat(ttsRate.value);

            const voices = window.speechSynthesis.getVoices();
            const selectedVoiceObj = voices.find(v => v.name === voiceSelect.value);
            if(selectedVoiceObj) utterance.voice = selectedVoiceObj;

            window.speechSynthesis.speak(utterance);
        }

        // VÒNG LẶP QUY ĐỔI ẢNH CHUẨN XÁC
        mainVideo.addEventListener('play', () => {
            mainVideo.muted = true;

            scanTimer = setInterval(async () => {
                if (mainVideo.paused || mainVideo.ended || !ocrWorker || isProcessingFrame) return;

                isProcessingFrame = true;

                canvas.width = mainVideo.videoWidth;
                canvas.height = mainVideo.videoHeight;

                const displayHeight = mainVideo.offsetHeight;
                const scaleFactor = mainVideo.videoHeight / displayHeight;

                const cropHeight = blurLayer.offsetHeight * scaleFactor;
                const cropBottom = parseFloat(window.getComputedStyle(blurLayer).bottom) * scaleFactor;
                const cropTop = mainVideo.videoHeight - cropBottom - cropHeight;

                ctx.drawImage(
                    mainVideo, 
                    0, cropTop, mainVideo.videoWidth, cropHeight, 
                    0, 0, mainVideo.videoWidth, cropHeight
                );

                // Bộ lọc làm nét chữ high-contrast cho mobile chống quét rác chữ
                try {
                    let imgData = ctx.getImageData(0, 0, canvas.width, cropHeight);
                    let data = imgData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        let brightness = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                        let finalColor = (brightness > 135) ? 255 : 0;
                        data[i] = finalColor; data[i+1] = finalColor; data[i+2] = finalColor;
                    }
                    ctx.putImageData(imgData, 0, 0);

                    const { data: { text } } = await ocrWorker.recognize(canvas);
                    let filteredText = text.replace(/[^a-zA-Z0-9\sÀ-ỹ]/g, '').replace(/\s+/g, ' ').trim();

                    if (filteredText.length > 2 && filteredText !== lastLoggedText) {
                        lastLoggedText = filteredText;
                        logOcr.innerText = `🔍 AI Đang đọc chữ: "${filteredText.substring(0, 25)}..."`;

                        let vietnameseResult = await executeTranslation(filteredText);
                        liveSubText.innerText = vietnameseResult;
                        playTtsVoice(vietnameseResult);
                    }
                } catch (ocrError) {
                    console.log("AI skip frame...");
                } finally {
                    isProcessingFrame = false;
                }

            }, 500); 
        });

        mainVideo.addEventListener('pause', () => {
            clearInterval(scanTimer);
            if (window.speechSynthesis) window.speechSynthesis.cancel();
        });

        mainVideo.addEventListener('seeking', () => {
            liveSubText.innerText = "...";
            lastLoggedText = "";
            if (window.speechSynthesis) window.speechSynthesis.cancel();
        });
    </script>
</body>
</html>
