<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Director Vision Mobile V3</title>
    <!-- Thư viện AI đọc chữ hình ảnh -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #090d16;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            background: #111827;
            width: 100%;
            max-width: 700px;
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            border: 1px solid #1f2937;
        }

        h2 {
            text-align: center;
            color: #38bdf8;
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 12px;
            margin-bottom: 15px;
        }

        /* Vùng thả/chọn file tối ưu mobile */
        .upload-zone {
            border: 2px dashed #0284c7;
            background: #030712;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .upload-zone p {
            font-size: 13px;
            font-weight: 600;
            color: #38bdf8;
        }
        #videoFileInput { display: none; }

        /* Bảng điều khiển Auto-Responsive cho Di Động */
        .config-grid {
            display: grid;
            grid-template-columns: 1fr; /* Mặc định 1 cột dọc trên điện thoại */
            gap: 12px;
            margin-bottom: 15px;
            background: #1f2937;
            padding: 12px;
            border-radius: 10px;
        }

        @media (min-width: 600px) {
            .config-grid {
                grid-template-columns: 1fr 1fr 1fr;
            }
            .sliders-wrapper {
                grid-column: span 3;
            }
        }

        .select-box { display: flex; flex-direction: column; }
        label {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        select {
            background: #030712;
            color: #f8fafc;
            border: 1px solid #4b5563;
            padding: 10px;
            border-radius: 8px;
            outline: none;
            font-size: 13px;
        }

        .sliders-wrapper {
            border-top: 1px solid #374151;
            padding-top: 10px;
            margin-top: 2px;
        }

        .control-sliders {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .slider-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #cbd5e1;
        }
        .slider-group input { flex: 1; accent-color: #38bdf8; height: 6px; }

        /* KHU VỰC KHUNG VIDEO CHUẨN ĐỒNG BỘ */
        .video-player-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid #374151;
        }

        video { 
            width: 100%; 
            display: block; 
            height: auto; 
        }

        /* THANH CHE PHỤ ĐỀ HỖ TRỢ CẢ CHUỘT VÀ CẢM ỨNG TAY - CHỈ TRONG VIDEO */
        .draggable-blur-layer {
            position: absolute;
            bottom: 12%;
            left: 2%;
            width: 96%;
            height: 50px;
            background: rgba(75, 85, 99, 0.98); 
            border: 1.5px dashed #ffffff;
            border-radius: 6px;
            cursor: move;
            z-index: 10;
            touch-action: none;
        }

        .resize-handle {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: #ffffff;
            cursor: ns-resize;
            opacity: 0.7;
            touch-action: none;
        }

        /* CHỮ PHỤ ĐỀ VIỆTSUB TO RÕ RÀNG */
        .live-vietsub-overlay {
            position: absolute;
            left: 2%;
            width: 96%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #ffffff; 
            font-size: 14px; 
            font-weight: 900;
            line-height: 1.4;
            z-index: 20;
            pointer-events: none;
            text-shadow: 
                3px 3px 0px #000, 
               -3px -3px 0px #000, 
                3px -3px 0px #000, 
               -3px 3px 0px #000,
                0px 3px 0px #000,
                0px -3px 0px #000,
                3px 0px 0px #000,
               -3px 0px 0px #000;
            word-wrap: break-word;
            overflow: hidden;
        }

        @media (min-width: 600px) {
            .live-vietsub-overlay { font-size: 18px; }
            .draggable-blur-layer { height: 65px; }
        }

        .status-bar {
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: #030712;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            border: 1px solid #1f2937;
        }
        .status-active { color: #34d399; font-weight: bold; }
        
        #captureCanvas { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>AI Director Vision Mobile V3</h2>
        <div class="subtitle">✨ Dịch phụ đề video LIVE - Hỗ trợ Trung/Anh/Nhật 🎬</div>

        <div class="upload-zone" id="dropZone">
            <p id="uploadText">👉 CHẠM VÀO ĐÂY ĐỂ CHỌN VIDEO 👈</p>
        </div>

        <div class="config-grid">
            <div class="select-box">
                <label>Chữ gốc trên phim</label>
                <select id="ocrLang">
                    <option value="chi_sim">Tiếng Trung (Giản thể)</option>
                    <option value="eng">Tiếng Anh (English)</option>
                    <option value="jpn">Tiếng Nhật</option>
                </select>
            </div>

            <div class="select-box">
                <label>Giọng Đọc Tiếng Việt</label>
                <select id="voiceSelect">
                    <option value="">Đang nạp giọng chuẩn hệ thống...</option>
                </select>
            </div>
            
            <div class="select-box">
                <label>Tốc độ giọng đọc AI</label>
                <select id="ttsRate">
                    <option value="1.25">1.25x (Khuyên dùng)</option>
                    <option value="1.0">1.0x (Bình thường)</option>
                    <option value="1.4">1.4x (Đọc nhanh)</option>
                </select>
            </div>

            <div class="sliders-wrapper">
                <label>Cân chỉnh vị trí thanh xám bằng thanh trượt hoặc kéo trực tiếp</label>
                <div class="control-sliders">
                    <div class="slider-group">
                        <span>Vị trí từ dưới lên (%):</span>
                        <input type="range" id="sliderY" min="0" max="90" value="12">
                        <span id="sliderYValue">12%</span>
                    </div>
                    <div class="slider-group">
                        <span>Độ cao thanh che (px):</span>
                        <input type="range" id="sliderHeight" min="25" max="150" value="50">
                        <span id="sliderHeightValue">50px</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- WORKSPACE VIDEO PLAYER -->
        <div class="video-player-wrapper" id="videoWrapper">
            <video id="mainVideo" controls playsinline></video>
            
            <!-- Thanh màu xám che phủ xóa phụ đề gốc (Hỗ trợ kéo bằng tay) - CHỈ BÊN TRONG VIDEO -->
            <div class="draggable-blur-layer" id="blurLayer">
                <div class="resize-handle" id="resizeHandle"></div>
            </div>
            
            <!-- Lớp hiển thị chữ phụ đề mới dịch rõ ràng đè lên trên -->
            <div class="live-vietsub-overlay" id="liveSubText">Chờ dịch...</div>
        </div>

        <div class="status-bar">
            <span id="logOcr">⏳ AI OCR: Sẵn sàng...</span>
            <span class="status-active">✓ Tắt tiếng video gốc tự động</span>
        </div>
    </div>

    <canvas id="captureCanvas"></canvas>

    <script>
        const videoFileInput = document.createElement('input');
        videoFileInput.type = 'file';
        videoFileInput.accept = 'video/*';
        
        const dropZone = document.getElementById('dropZone');
        const uploadText = document.getElementById('uploadText');
        const mainVideo = document.getElementById('mainVideo');
        const videoWrapper = document.getElementById('videoWrapper');
        const blurLayer = document.getElementById('blurLayer');
        const liveSubText = document.getElementById('liveSubText');
        
        const sliderY = document.getElementById('sliderY');
        const sliderHeight = document.getElementById('sliderHeight');
        const sliderYValue = document.getElementById('sliderYValue');
        const sliderHeightValue = document.getElementById('sliderHeightValue');
        const ocrLangSelect = document.getElementById('ocrLang');
        const voiceSelect = document.getElementById('voiceSelect');
        const ttsRate = document.getElementById('ttsRate');
        const logOcr = document.getElementById('logOcr');
        
        const canvas = document.getElementById('captureCanvas');
        const ctx = canvas.getContext('2d');

        let ocrWorker = null;
        let scanTimer = null;
        let lastLoggedText = "";
        let isProcessingFrame = false;
        let videoWidth = 0;
        let videoHeight = 0;

        // Cập nhật giá trị hiển thị slider
        sliderY.addEventListener('input', function() {
            sliderYValue.textContent = this.value + '%';
            blurLayer.style.bottom = this.value + '%';
            syncSubtitlePosition();
        });

        sliderHeight.addEventListener('input', function() {
            sliderHeightValue.textContent = this.value + 'px';
            blurLayer.style.height = this.value + 'px';
            syncSubtitlePosition();
        });

        function syncSubtitlePosition() {
            const barBottom = blurLayer.style.bottom || window.getComputedStyle(blurLayer).bottom;
            const barHeight = parseFloat(window.getComputedStyle(blurLayer).height);
            liveSubText.style.bottom = barBottom;
            liveSubText.style.height = barHeight + 'px';
            liveSubText.style.lineHeight = barHeight + 'px';
        }

        function loadVoices() {
            if (!('speechSynthesis' in window)) return;
            const voices = window.speechSynthesis.getVoices();
            voiceSelect.innerHTML = '';
            const viVoices = voices.filter(v => v.lang.includes('vi') || v.lang.includes('VI'));
            
            if(viVoices.length > 0) {
                viVoices.forEach(v => {
                    let option = document.createElement('option');
                    option.value = v.name;
                    option.innerText = `Giọng Việt: ${v.name}`;
                    voiceSelect.appendChild(option);
                });
            } else {
                let option = document.createElement('option');
                option.value = "";
                option.innerText = "Giọng mặc định thiết bị";
                voiceSelect.appendChild(option);
            }
        }
        if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }
        setTimeout(loadVoices, 600);

        async function startOcrCore() {
            logOcr.innerText = "🤖 Đang tải bộ xử lý ảnh AI...";
            try {
                ocrWorker = await Tesseract.createWorker(ocrLangSelect.value);
                logOcr.innerText = "⚡ Hệ thống sẵn sàng! Bấm Play để dịch.";
            } catch(e) {
                logOcr.innerText = "❌ Lỗi tải ngôn ngữ AI: " + e.message;
                console.error(e);
            }
        }
        startOcrCore();

        ocrLangSelect.addEventListener('change', async () => {
            if(ocrWorker) await ocrWorker.terminate();
            startOcrCore();
        });

        dropZone.addEventListener('click', () => videoFileInput.click());
        videoFileInput.addEventListener('change', function() {
            if(this.files.length > 0) {
                mainVideo.src = URL.createObjectURL(this.files[0]);
                uploadText.innerHTML = `✅ Video: <span style="color:#22c55e">${this.files[0].name}</span>`;
                mainVideo.muted = true;
                liveSubText.innerText = "Chờ dịch...";
            }
        });

        mainVideo.addEventListener('loadedmetadata', () => {
            videoWidth = mainVideo.videoWidth;
            videoHeight = mainVideo.videoHeight;
            syncSubtitlePosition();
        });

        let isDragging = false, isResizing = false, yStart, startBottom, startHeight;

        function getClientY(e) {
            return e.touches ? e.touches[0].clientY : e.clientY;
        }

        function actionStart(e, type) {
            if (type === 'resize') {
                isResizing = true;
                e.stopPropagation();
            } else {
                if (e.target.id === 'resizeHandle') return;
                isDragging = true;
            }
            yStart = getClientY(e);
            startBottom = parseInt(window.getComputedStyle(blurLayer).bottom, 10) || 0;
            startHeight = parseInt(window.getComputedStyle(blurLayer).height, 10) || 50;
            
            if(e.cancelable) e.preventDefault();
        }

        function actionMove(e) {
            if (!isDragging && !isResizing) return;
            
            let currentY = getClientY(e);
            let deltaY = yStart - currentY;

            if (isDragging) {
                let targetBottom = startBottom + deltaY;
                let maxH = mainVideo.offsetHeight || 1;
                targetBottom = Math.min(90 * maxH / 100, Math.max(0, targetBottom));
                blurLayer.style.bottom = targetBottom + 'px';
                sliderY.value = Math.min(90, Math.max(0, Math.round((targetBottom / maxH) * 100)));
                sliderYValue.textContent = sliderY.value + '%';
            }
            if (isResizing) {
                let newH = startHeight + deltaY;
                if(newH > 20 && newH < 200) {
                    blurLayer.style.height = newH + 'px';
                    sliderHeight.value = newH;
                    sliderHeightValue.textContent = newH + 'px';
                }
            }

            syncSubtitlePosition();
            if(e.cancelable) e.preventDefault();
        }

        function actionEnd() {
            isDragging = false;
            isResizing = false;
            syncSubtitlePosition();
        }

        blurLayer.addEventListener('mousedown', (e) => actionStart(e, 'drag'));
        document.getElementById('resizeHandle').addEventListener('mousedown', (e) => actionStart(e, 'resize'));
        document.addEventListener('mousemove', actionMove);
        document.addEventListener('mouseup', actionEnd);

        blurLayer.addEventListener('touchstart', (e) => actionStart(e, 'drag'), { passive: false });
        document.getElementById('resizeHandle').addEventListener('touchstart', (e) => actionStart(e, 'resize'), { passive: false });
        document.addEventListener('touchmove', actionMove, { passive: false });
        document.addEventListener('touchend', actionEnd);

        syncSubtitlePosition();

        // Cải thiện dịch thuật - retry + cache
        const translationCache = {};
        async function executeTranslation(rawText) {
            if (translationCache[rawText]) return translationCache[rawText];
            
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=vi&dt=t&q=${encodeURIComponent(rawText)}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Translation failed');
                
                const result = await response.json();
                const translated = result[0].map(item => item[0]).join('');
                
                translationCache[rawText] = translated;
                return translated;
            } catch (err) { 
                console.log("Translation error:", err);
                return rawText; 
            }
        }

        function playTtsVoice(translatedText) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel(); 

            const utterance = new SpeechSynthesisUtterance(translatedText);
            utterance.lang = 'vi-VN';
            utterance.rate = parseFloat(ttsRate.value);
            utterance.volume = 1;
            utterance.pitch = 1;

            const voices = window.speechSynthesis.getVoices();
            const selectedVoiceObj = voices.find(v => v.name === voiceSelect.value);
            if(selectedVoiceObj) utterance.voice = selectedVoiceObj;

            window.speechSynthesis.speak(utterance);
        }

        // Cải thiện OCR - tăng độ tương phản, xóa noise
        function enhanceImageForOCR(imageData) {
            const data = imageData.data;
            
            // Tăng tương phản
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i+1];
                let b = data[i+2];
                
                // Chuyển sang grayscale với trọng số tối ưu
                let gray = 0.299 * r + 0.587 * g + 0.114 * b;
                
                // Tăng tương phản (contrast stretching)
                gray = gray < 128 ? Math.max(0, gray - 30) : Math.min(255, gray + 30);
                
                data[i] = gray;
                data[i+1] = gray;
                data[i+2] = gray;
            }
            
            return imageData;
        }

        mainVideo.addEventListener('play', () => {
            mainVideo.muted = true;

            scanTimer = setInterval(async () => {
                if (mainVideo.paused || mainVideo.ended || !ocrWorker || isProcessingFrame) return;

                isProcessingFrame = true;

                canvas.width = mainVideo.videoWidth;
                canvas.height = mainVideo.videoHeight;

                const displayHeight = mainVideo.offsetHeight;
                const displayWidth = mainVideo.offsetWidth;
                const scaleY = mainVideo.videoHeight / displayHeight;
                const scaleX = mainVideo.videoWidth / displayWidth;

                // Tính toán vùng crop từ blur layer
                const blurBottom = parseFloat(window.getComputedStyle(blurLayer).bottom);
                const blurHeight = parseFloat(window.getComputedStyle(blurLayer).height);
                const blurLeft = parseFloat(window.getComputedStyle(blurLayer).left);
                const blurWidth = parseFloat(window.getComputedStyle(blurLayer).width);

                const cropLeft = blurLeft * scaleX;
                const cropTop = mainVideo.videoHeight - (blurBottom + blurHeight) * scaleY;
                const cropWidth = blurWidth * scaleX;
                const cropHeight = blurHeight * scaleY;

                ctx.drawImage(
                    mainVideo, 
                    cropLeft, cropTop, cropWidth, cropHeight, 
                    0, 0, canvas.width, canvas.height
                );

                try {
                    let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    
                    // Tăng cường độ hình ảnh
                    imgData = enhanceImageForOCR(imgData);
                    
                    ctx.putImageData(imgData, 0, 0);

                    const { data: { text } } = await ocrWorker.recognize(canvas);
                    
                    // Bộ lọc Unicode toàn cầu - giữ tất cả chữ cái
                    let filteredText = text
                        .replace(/[^\p{L}\p{N}\s\.\,\!\?\-]/gu, '')
                        .replace(/\s+/g, ' ')
                        .trim();

                    if (filteredText.length >= 2 && filteredText !== lastLoggedText) {
                        lastLoggedText = filteredText;
                        logOcr.innerText = `🔍 OCR: "${filteredText.substring(0, 30)}..."`;

                        let vietnameseResult = await executeTranslation(filteredText);
                        liveSubText.innerText = vietnameseResult;
                        playTtsVoice(vietnameseResult);
                    }
                } catch (ocrError) {
                    console.log("OCR frame skip");
                } finally {
                    isProcessingFrame = false;
                }

            }, 800); // Tăng interval từ 500ms lên 800ms để cải thiện độ chính xác
        });

        mainVideo.addEventListener('pause', () => {
            clearInterval(scanTimer);
            if (window.speechSynthesis) window.speechSynthesis.cancel();
            logOcr.innerText = "⏸️ Tạm dừng";
        });

        mainVideo.addEventListener('ended', () => {
            clearInterval(scanTimer);
            logOcr.innerText = "✓ Phim kết thúc";
        });
    </script>
</body>
</html>
