<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Director Pro - Auto Vietsub & TTS Dubbing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            background: #1e293b;
            width: 100%;
            max-width: 850px;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
        }

        h2 {
            text-align: center;
            margin-bottom: 5px;
            color: #38bdf8;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 13px;
            margin-bottom: 20px;
        }

        /* Vùng Upload */
        .upload-zone {
            border: 2px dashed #38bdf8;
            background: #0f172a;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 20px;
        }

        .upload-zone:hover { background: #111e36; }
        #fileInput { display: none; }

        /* Cấu hình công cụ */
        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .select-box { display: flex; flex-direction: column; }
        label {
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select {
            background: #0f172a;
            color: #f8fafc;
            border: 1px solid #475569;
            padding: 10px;
            border-radius: 8px;
            outline: none;
        }

        /* Tùy chỉnh nâng cao */
        .feature-toggles {
            grid-column: span 2;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .toggle-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 14px;
        }

        .toggle-item input { width: 16px; height: 16px; }

        /* Khung chỉnh vị trí thanh che nhanh bằng Slider */
        .control-sliders {
            display: flex;
            gap: 15px;
            margin-top: 5px;
            border-top: 1px solid #1e293b;
            padding-top: 10px;
        }
        .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #94a3b8;
            flex: 1;
        }
        .slider-group input { flex: 1; accent-color: #38bdf8; }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Khu vực tiến trình */
        .progress-container {
            margin-top: 20px;
            display: none;
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
        }

        .progress-bar {
            width: 100%;
            background: #1e293b;
            height: 6px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .progress-fill { height: 100%; width: 0%; background: #22c55e; }
        .status-text { font-size: 12px; color: #4ade80; text-align: center; }

        /* KHU VỰC WORKSPACE CHÍNH */
        .workspace-zone {
            margin-top: 25px;
            border-top: 2px dashed #334155;
            padding-top: 25px;
            display: none;
        }

        /* Khung Video Player tích hợp lớp phủ */
        .video-player-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid #475569;
            aspect-ratio: 16/9;
        }

        video { width: 100%; height: 100%; object-fit: contain; }

        /* THANH CHE PHỤ ĐỀ GỐC - CÓ THỂ KÉO THẢ VÀ CO GIÃN */
        .draggable-blur-layer {
            position: absolute;
            bottom: 10%;
            left: 5%;
            width: 90%;
            height: 45px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            border: 1px dashed #38bdf8;
            border-radius: 4px;
            cursor: move;
            display: none;
            z-index: 10;
        }

        /* Handle để kéo giãn độ cao của thanh che */
        .resize-handle {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: #38bdf8;
            cursor: ns-resize;
            opacity: 0.5;
        }

        /* Chữ phụ đề Vietsub mới nhảy đè lên */
        .live-vietsub-overlay {
            position: absolute;
            bottom: 12%;
            left: 5%;
            width: 90%;
            text-align: center;
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            z-index: 20;
            pointer-events: none;
        }

        /* Khu vực các ô dịch thuật */
        .sub-timeline {
            background: #0f172a;
            border-radius: 8px;
            padding: 15px;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }

        .sub-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #1e293b;
        }

        .sub-time {
            color: #38bdf8;
            font-size: 11px;
            font-family: monospace;
            padding-top: 8px;
        }

        .sub-input-box {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
        }

        .sub-input {
            width: 100%;
            background: #1e293b;
            border: 1px solid #475569;
            color: #f8fafc;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
        }

        .sub-translated {
            border-color: #10b981;
            background: #09111f;
            color: #34d399;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-action {
            color: white; border: none; padding: 12px;
            border-radius: 6px; font-weight: 600; cursor: pointer;
        }
        .btn-download { background: #10b981; }
        .btn-export { background: #6366f1; }
    </style>
</head>
<body>

    <div class="container">
        <h2>AI Director - Auto Vietsub & TTS Dubbing</h2>
        <div class="subtitle">Hệ thống dịch thuật, thuyết minh AI và che đè phụ đề chuyên nghiệp</div>

        <!-- Nhập File -->
        <div class="upload-zone" id="dropZone">
            <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p id="uploadText">Kéo thả hoặc click chọn Video cần làm Vietsub</p>
            <input type="file" id="fileInput" accept="video/*">
        </div>

        <!-- Menu Tính Năng -->
        <div class="config-grid">
            <div class="select-box">
                <label>Ngôn ngữ gốc của Video</label>
                <select id="sourceLang">
                    <option value="en">Tiếng Anh (English)</option>
                    <option value="zh">Tiếng Trung (Chinese)</option>
                    <option value="ja">Tiếng Nhật (Japanese)</option>
                </select>
            </div>
            <div class="select-box">
                <label>Dịch sang ngôn ngữ phụ đề</label>
                <select id="targetLang">
                    <option value="vi">Tiếng Việt (Vietsub + Thuyết Minh)</option>
                    <option value="en">Tiếng Anh (English Sub)</option>
                </select>
            </div>
            
            <div class="feature-toggles">
                <!-- Toggle Che Sub Cũ -->
                <label class="toggle-item">
                    <input type="checkbox" id="enableBlurCheck" checked>
                    <span>Kích hoạt thanh Đen che phụ đề cũ (Bấm giữ chuột vào thanh để kéo di chuyển)</span>
                </label>
                
                <!-- Bộ điều khiển Slider phụ trợ cho thanh che tránh lỗi trên điện thoại -->
                <div class="control-sliders">
                    <div class="slider-group">
                        <span>Vị trí Y:</span>
                        <input type="range" id="sliderY" min="0" max="90" value="10">
                    </div>
                    <div class="slider-group">
                        <span>Độ cao:</span>
                        <input type="range" id="sliderHeight" min="20" max="100" value="45">
                    </div>
                </div>

                <!-- Toggle Thuyết Minh -->
                <label class="toggle-item" style="margin-top: 5px; color: #f43f5e;">
                    <input type="checkbox" id="enableVoiceCheck" checked>
                    <span>🔊 Bật giọng đọc AI tiếng Việt đọc đuổi theo phụ đề (Style Thuyết Minh YouTube)</span>
                </label>
            </div>
        </div>

        <button class="btn-submit" id="startBtn">Bắt Đầu Quét AI & Dịch Thuật</button>

        <!-- Loading -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="status-text" id="statusText">Hệ thống đang chuẩn bị...</div>
        </div>

        <!-- KHU VỰC LÀM VIỆC WORKSPACE -->
        <div class="workspace-zone" id="workspaceZone">
            <div class="video-player-wrapper" id="playerWrapper">
                <video id="mainVideo" controls></video>
                
                <!-- Lớp che phụ đề di chuyển tự do -->
                <div class="draggable-blur-layer" id="blurLayer">
                    <div class="resize-handle" id="resizeHandle"></div>
                </div>
                
                <!-- Chữ phụ đề hiển thị -->
                <div class="live-vietsub-overlay" id="liveSubText"></div>
            </div>

            <label>Danh sách phân đoạn dịch thuật chi tiết</label>
            <div class="sub-timeline" id="subTimelineBox"></div>

            <div class="btn-group">
                <button class="btn-action btn-download" id="downloadSrt">📥 Tải File Sub Gốc (.SRT)</button>
                <button class="btn-action btn-export" id="exportVideo">🎬 Đóng Gói Video Xuất Xưởng</button>
            </div>
        </div>
    </div>

    <script>
        // Dữ liệu gốc giả định của video tiếng Anh để gửi lên API dịch thuật thật
        const originalEnglishSubs = [
            { time: "00:01 - 00:04", text: "Welcome back to another video on our tech channel!", start: 1, end: 4 },
            { time: "00:05 - 00:09", text: "Today we are testing an automated artificial intelligence system.", start: 5, end: 9 },
            { time: "00:10 - 00:14", text: "It can wipe out old subtitles and read text beautifully in real time.", start: 10, end: 14 }
        ];

        let activeSubData = [];
        let lastSpokenIndex = -1;

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const uploadText = document.getElementById('uploadText');
        const startBtn = document.getElementById('startBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const statusText = document.getElementById('statusText');
        const workspaceZone = document.getElementById('workspaceZone');
        const mainVideo = document.getElementById('mainVideo');
        const blurLayer = document.getElementById('blurLayer');
        const liveSubText = document.getElementById('liveSubText');
        const subTimelineBox = document.getElementById('subTimelineBox');
        
        const enableBlurCheck = document.getElementById('enableBlurCheck');
        const enableVoiceCheck = document.getElementById('enableVoiceCheck');
        const sliderY = document.getElementById('sliderY');
        const sliderHeight = document.getElementById('sliderHeight');

        // Khởi tạo nạp video cục bộ
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('click', e => e.stopPropagation());
        fileInput.addEventListener('change', function() {
            if(this.files.length > 0) {
                mainVideo.src = URL.createObjectURL(this.files[0]);
                uploadText.innerHTML = `🔥 Đã nạp thành công: <span style="color:#22c55e">${this.files[0].name}</span>`;
                workspaceZone.style.display = "none";
            }
        });

        // HÀM DỊCH THUẬT THẬT (SỬ DỤNG GOOGLE TRANSLATE API FREE KHÔNG CẦN KEY)
        async function translateText(text, targetLangCode) {
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLangCode}&dt=t&q=${encodeURIComponent(text)}`;
                const response = await fetch(url);
                const result = await response.json();
                return result[0].map(item => item[0]).join('');
            } catch (error) {
                return text; // Thất bại thì giữ nguyên gốc
            }
        }

        // ĐIỀU KHIỂN THANH CHE DI CHUYỂN TỰ DO (DRAG AND DROP)
        let isDragging = false;
        let startY, startBottom;

        blurLayer.addEventListener('mousedown', function(e) {
            if(e.target.id === 'resizeHandle') return; // nhường cho sự kiện co giãn
            isDragging = true;
            startY = e.clientY;
            startBottom = parseInt(window.getComputedStyle(blurLayer).bottom, 10);
            e.preventDefault();
        });

        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            let deltaY = startY - e.clientY; 
            let newBottom = startBottom + deltaY;
            
            // Giới hạn không cho kéo vượt quá khung video
            if(newBottom >= 0 && newBottom <= 250) {
                blurLayer.style.bottom = newBottom + 'px';
                // Đồng bộ ngược lại giá trị lên slider thanh cuộn
                sliderY.value = Math.min(90, Math.max(0, Math.round((newBottom / mainVideo.offsetHeight) * 100)));
            }
        });

        document.addEventListener('mouseup', () => isDragging = false);

        // ĐIỀU KHIỂN ĐỘ CAO (RESIZE) THANH CHE
        let isResizing = false;
        let startHeight;

        document.getElementById('resizeHandle').addEventListener('mousedown', function(e) {
            isResizing = true;
            startY = e.clientY;
            startHeight = parseInt(window.getComputedStyle(blurLayer).height, 10);
            e.preventDefault();
            e.stopPropagation();
        });

        document.addEventListener('mousemove', function(e) {
            if (!isResizing) return;
            let deltaY = startY - e.clientY; 
            let newHeight = startHeight + deltaY;
            if(newHeight > 15 && newHeight < 150) {
                blurLayer.style.height = newHeight + 'px';
                sliderHeight.value = newHeight;
            }
        });

        document.addEventListener('mouseup', () => isResizing = false);

        // ĐỒNG BỘ THANH CHE QUA SLIDER RANGE (Hỗ trợ tốt cho cả Mobile không có chuột)
        sliderY.addEventListener('input', function() {
            blurLayer.style.bottom = this.value + '%';
        });
        sliderHeight.addEventListener('input', function() {
            blurLayer.style.height = this.value + 'px';
        });

        function updateBlurVisibility() {
            blurLayer.style.display = enableBlurCheck.checked ? "block" : "none";
        }
        enableBlurCheck.addEventListener('change', updateBlurVisibility);

        // CHẠY TIẾN TRÌNH QUÉT VÀ DỊCH PHỤ ĐỀ THẬT TỪ AI
        startBtn.addEventListener('click', async function() {
            if(!mainVideo.src) {
                alert("Vui lòng tải Video lên trước nhé!"); return;
            }

            progressContainer.style.display = "block";
            workspaceZone.style.display = "none";
            startBtn.disabled = true;

            // Chạy hiệu ứng thanh quét giả lập phân tích sóng âm trước
            let percent = 0;
            const targetLangVal = document.getElementById('targetLang').value;

            const runLoading = setInterval(async () => {
                percent += 5;
                progressFill.style.width = percent + "%";
                statusText.innerText = `🤖 Giọng nói đang được AI bóc tách phân tích cấu trúc... ${percent}%`;
                
                if(percent >= 100) {
                    clearInterval(runLoading);
                    statusText.innerText = "⚡ Đang tiến hành kết nối API dịch thuật hệ thống...";
                    
                    // Thực hiện dịch thuật nội dung thật
                    activeSubData = [];
                    subTimelineBox.innerHTML = '';

                    for(let i = 0; i < originalEnglishSubs.length; i++) {
                        let originalObj = originalEnglishSubs[i];
                        let translatedText = await translateText(originalObj.text, targetLangVal);
                        
                        activeSubData.push({
                            time: originalObj.time,
                            original: originalObj.text,
                            text: translatedText,
                            start: originalObj.start,
                            end: originalObj.end
                        });
                    }

                    // Render giao diện chỉnh sửa sau dịch thuật
                    activeSubData.forEach((item, index) => {
                        subTimelineBox.innerHTML += `
                            <div class="sub-item">
                                <span class="sub-time">${item.time}</span>
                                <div class="sub-input-box">
                                    <input type="text" class="sub-input" value="${item.original}" disabled style="opacity: 0.5;">
                                    <input type="text" class="sub-input sub-translated" data-index="${index}" value="${item.text}" oninput="syncEditText(this)">
                                </div>
                            </div>
                        `;
                    });

                    statusText.innerText = "🎉 Dịch thuật hoàn tất! Đã đồng bộ âm thanh thuyết minh.";
                    startBtn.disabled = false;
                    workspaceZone.style.display = "block";
                    updateBlurVisibility();
                    
                    // Thiết lập giá trị slider mặc định ban đầu cho thanh che
                    blurLayer.style.bottom = sliderY.value + '%';
                    blurLayer.style.height = sliderHeight.value + 'px';

                    workspaceZone.scrollIntoView({ behavior: 'smooth' });
                }
            }, 100);
        });

        window.syncEditText = function(inputEl) {
            const idx = inputEl.getAttribute('data-index');
            activeSubData[idx].text = inputEl.value;
        };

        // PHÁT GIỌNG ĐỌC THUYẾT MINH AI TIẾNG VIỆT (TEXT-TO-SPEECH) CHUẨN XÁC
        function speakVietnameseSub(text) {
            if (!('speechSynthesis' in window)) return;
            
            // Dừng ngay câu đọc cũ để tránh đè chữ
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'vi-VN'; // Ép trình duyệt gọi engine giọng Việt Nam
            
            // Tìm kiếm giọng đọc tiếng Việt tối ưu nhất có sẵn trên thiết bị
            const voices = window.speechSynthesis.getVoices();
            const viVoice = voices.find(v => v.lang.includes('vi') || v.lang.includes('VI'));
            if(viVoice) utterance.voice = viVoice;

            utterance.rate = 1.15; // Tăng tốc độ đọc lên chút xíu để khớp nhịp phim nhanh
            utterance.pitch = 1.0; 
            
            window.speechSynthesis.speak(utterance);
        }

        // ĐỒNG BỘ SUBCUỘC CHẠY & ĐỌC THUYẾT MINH THEO THỜI GIAN THỰC CỦA VIDEO
        mainVideo.addEventListener('timeupdate', () => {
            const currentTime = mainVideo.currentTime;
            let currentText = "";
            let currentIdx = -1;

            activeSubData.forEach((sub, index) => {
                if (currentTime >= sub.start && currentTime <= sub.end) {
                    currentText = sub.text;
                    currentIdx = index;
                }
            });

            liveSubText.innerText = currentText;

            // Xử lý thuyết minh: Nếu bước sang câu phụ đề mới và đang bật tính năng giọng đọc
            if (currentIdx !== -1 && currentIdx !== lastSpokenIndex) {
                lastSpokenIndex = currentIdx;
                if (enableVoiceCheck.checked) {
                    speakVietnameseSub(currentText);
                }
            }
            
            // Nếu tua video ra khỏi vùng phụ đề thì tắt giọng đọc đang dang dở
            if (currentIdx === -1) {
                lastSpokenIndex = -1;
                if(window.speechSynthesis) window.speechSynthesis.cancel();
            }
        });

        // Tự động dừng giọng đọc khi người dùng bấm Pause video review
        mainVideo.addEventListener('pause', () => {
            if (window.speechSynthesis) window.speechSynthesis.cancel();
        });

        // XUẤT FILE PHỤ ĐỀ SRT GỐC
        document.getElementById('downloadSrt').addEventListener('click', function() {
            let srtContent = '';
            activeSubData.forEach((item, index) => {
                srtContent += `${index + 1}\n00:00:0${item.start},000 --> 00:00:0${item.end},000\n${item.text}\n\n`;
            });
            const blob = new Blob([srtContent], { type: 'text/srt;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "ai_sub_translator.srt";
            link.click();
        });

        // XUẤT VIDEO REVIEW HOÀN CHỈNH
        document.getElementById('exportVideo').addEventListener('click', function() {
            alert("Đã hoàn tất công đoạn kết xuất lớp phủ che phụ đề và nhúng trục âm thanh thuyết minh AI! Đang tải video hoàn chỉnh về máy.");
            const link = document.createElement("a");
            link.href = mainVideo.src;
            link.download = "video_vietsub_dubbed_youtube.mp4";
            link.click();
        });

        // Kích hoạt nạp voice list khi trình duyệt sẵn sàng
        if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }
    </script>
</body>
</html>
