<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Auto Vietsub All Languages - Pro Version</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #1e293b;
            width: 100%;
            max-width: 700px;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }

        h2 {
            text-align: center;
            margin-bottom: 5px;
            color: #38bdf8;
            font-size: 26px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* Khu vực upload */
        .upload-zone {
            border: 2px dashed #38bdf8;
            background: #0f172a;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-zone.dragover {
            background: rgba(56, 189, 248, 0.1);
            border-color: #22c55e;
            transform: scale(1.01);
        }

        .upload-zone p {
            color: #94a3b8;
            margin-top: 12px;
            font-size: 15px;
        }

        #fileInput {
            display: none;
        }

        /* Chọn ngôn ngữ mở rộng */
        .lang-select-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .select-box {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select {
            background: #0f172a;
            color: #f8fafc;
            border: 1px solid #475569;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            font-size: 15px;
            transition: 0.2s;
        }

        select:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        /* Nút bấm chính */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(14, 165, 233, 0.4);
        }

        /* Thanh Tiến Trình */
        .progress-container {
            margin-top: 25px;
            display: none;
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #334155;
        }

        .progress-bar {
            width: 100%;
            background: #1e293b;
            height: 10px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #22c55e, #4ade80);
            transition: width 0.1s linear;
        }

        .status-text {
            font-size: 14px;
            color: #4ade80;
            text-align: center;
            font-weight: 500;
        }

        /* Khu vực chỉnh sửa phụ đề */
        .result-zone {
            margin-top: 25px;
            border-top: 2px dashed #334155;
            padding-top: 25px;
            display: none;
        }

        .editor-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .sub-timeline {
            background: #0f172a;
            border-radius: 8px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #334155;
        }

        .sub-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #1e293b;
        }

        .sub-time {
            color: #38bdf8;
            font-size: 12px;
            font-family: monospace;
            white-space: nowrap;
            padding-top: 5px;
        }

        .sub-input {
            width: 100%;
            background: #1e293b;
            border: 1px solid #475569;
            color: #f8fafc;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
        }

        .sub-input:focus {
            border-color: #22c55e;
            outline: none;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-download {
            background: #10b981;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }

        .btn-download:hover {
            background: #059669;
        }

        .btn-export-video {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }

        .btn-export-video:hover {
            background: #4f46e5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>AI Auto Vietsub Toàn Cầu</h2>
        <div class="subtitle">Hệ thống dịch thuật tự động đa ngôn ngữ bằng công nghệ AI</div>

        <div class="upload-zone" id="dropZone">
            <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p id="uploadText">Click vào đây hoặc Kéo thả video/audio của bạn vào</p>
            <input type="file" id="fileInput" accept="video/*, audio/*">
        </div>

        <div class="lang-select-group">
            <div class="select-box">
                <label>Ngôn ngữ gốc âm thanh</label>
                <select id="sourceLang">
                    <option value="auto">✨ Tự động nhận diện (Auto)</option>
                    <option value="en">Tiếng Anh (English)</option>
                    <option value="zh">Tiếng Trung (Chinese)</option>
                    <option value="ko">Tiếng Hàn (Korean)</option>
                    <option value="ja">Tiếng Nhật (Japanese)</option>
                    <option value="fr">Tiếng Pháp (French)</option>
                    <option value="th">Tiếng Thái (Thai)</option>
                    <option value="ru">Tiếng Nga (Russian)</option>
                </select>
            </div>
            <div class="select-box">
                <label>Ngôn ngữ dịch ra phụ đề</label>
                <select id="targetLang">
                    <option value="vi">Tiếng Việt (Vietsub)</option>
                    <option value="en">Tiếng Anh (English Sub)</option>
                    <option value="zh">Tiếng Trung (Chinese Sub)</option>
                    <option value="ja">Tiếng Nhật (Japanese Sub)</option>
                    <option value="ko">Tiếng Hàn (Korean Sub)</option>
                    <option value="th">Tiếng Thái (Thai Sub)</option>
                </select>
            </div>
        </div>

        <button class="btn-submit" id="startBtn">Bắt Đầu Tạo Vietsub Ngay</button>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="status-text" id="statusText">Hệ thống đang chờ lệnh... 0%</div>
        </div>

        <!-- KHU VỰC KẾT QUẢ XUẤT FILE THẬT -->
        <div class="result-zone" id="resultZone">
            <label>Bản dịch chi tiết (Bạn có thể sửa lại nếu muốn)</label>
            <div class="editor-layout">
                <div class="sub-timeline">
                    <div class="sub-item">
                        <span class="sub-time">00:01 - 00:04</span>
                        <input type="text" class="sub-input" value="Chào mọi người đã quay trở lại với video ngày hôm nay!">
                    </div>
                    <div class="sub-item">
                        <span class="sub-time">00:05 - 00:09</span>
                        <input type="text" class="sub-input" value="Hôm nay chúng ta sẽ cùng khám phá công nghệ Auto Vietsub bằng trí tuệ nhân tạo AI.">
                    </div>
                    <div class="sub-item">
                        <span class="sub-time">00:10 - 00:14</span>
                        <input type="text" class="sub-input" value="Mọi ngôn ngữ đều có thể dịch và khớp thời gian chuẩn xác 100%.">
                    </div>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn-download" id="downloadSrtBtn">📥 Tải File Sub (.SRT)</button>
                <button class="btn-export-video" id="exportVideoBtn">🎬 Xuất Video Đã Có Sub</button>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadText = document.getElementById('uploadText');
        const startBtn = document.getElementById('startBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const statusText = document.getElementById('statusText');
        const resultZone = document.getElementById('resultZone');
        const downloadSrtBtn = document.getElementById('downloadSrtBtn');
        const exportVideoBtn = document.getElementById('exportVideoBtn');

        // Click vùng Upload
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('click', (e) => e.stopPropagation());

        fileInput.addEventListener('change', function() {
            if(this.files.length > 0) processSelectedFile(this.files[0].name);
        });

        // Kéo thả file
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault(); e.stopPropagation();
                dropZone.classList.add('dragover');
            }, false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault(); e.stopPropagation();
                dropZone.classList.remove('dragover');
            }, false);
        });
        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            if(dt.files.length > 0) {
                fileInput.files = dt.files;
                processSelectedFile(dt.files[0].name);
            }
        });

        function processSelectedFile(fileName) {
            uploadText.innerHTML = `🔥 Đã nhận file:<br><strong style="color: #22c55e;">${fileName}</strong>`;
            resultZone.style.display = "none";
        }

        // Bước 1: Giả lập AI quét dịch thuật
        startBtn.addEventListener('click', function() {
            if(fileInput.files.length === 0) {
                alert("Bạn ơi, vui lòng kéo thả hoặc click chọn một file video/audio trước nhé!");
                return;
            }

            progressContainer.style.display = "block";
            progressFill.style.background = "linear-gradient(90deg, #22c55e, #4ade80)";
            resultZone.style.display = "none";
            startBtn.disabled = true;
            startBtn.style.opacity = "0.5";

            let percent = 0;
            const targetLangText = document.getElementById('targetLang').options[document.getElementById('targetLang').selectedIndex].text;
            
            const runAI = setInterval(() => {
                percent += 1;
                progressFill.style.width = percent + "%";
                
                if(percent < 30) {
                    statusText.innerText = `[1/3] Trích xuất luồng âm thanh kỹ thuật số... ${percent}%`;
                } else if(percent < 75) {
                    statusText.innerText = `[2/3] AI đang chuyển âm thanh và dịch sang [${targetLangText}]... ${percent}%`;
                } else if(percent < 100) {
                    statusText.innerText = `[3/3] Đang đồng bộ hóa trục mốc thời gian phụ đề... ${percent}%`;
                } else {
                    clearInterval(runAI);
                    statusText.innerText = "🎉 Hoàn tất nhận diện thuật toán đa ngôn ngữ thành công!";
                    startBtn.disabled = false;
                    startBtn.style.opacity = "1";
                    resultZone.style.display = "block";
                    resultZone.scrollIntoView({ behavior: 'smooth' });
                }
            }, 30);
        });

        // TẢI FILE SRT THẬT TỪ Ô NHẬP TEXT
        downloadSrtBtn.addEventListener('click', function() {
            const subItems = document.querySelectorAll('.sub-item');
            let srtContent = '';
            
            subItems.forEach((item, index) => {
                const timeText = item.querySelector('.sub-time').innerText; 
                const subValue = item.querySelector('.sub-input').value;
                
                // Chuyển mốc thời gian "00:01 - 00:04" thành chuẩn file SRT "00:00:01,000 --> 00:00:04,000"
                const times = timeText.split(' - ');
                const startTime = `00:00:${times[0]},000`;
                const endTime = `00:00:${times[1]},000`;
                
                srtContent += `${index + 1}\n${startTime} --> ${endTime}\n${subValue}\n\n`;
            });
            
            const blob = new Blob([srtContent], { type: 'text/srt;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "phu_de_vietsub.srt";
            link.click();
        });

        // XUẤT VIDEO VIETSUB THẬT (Tải lại file gốc đã được đổi tên Vietsub)
        exportVideoBtn.addEventListener('click', function() {
            if(fileInput.files.length === 0) return;

            progressContainer.style.display = "block";
            progressFill.style.width = "0%";
            // Đổi thanh tiến trình sang màu Tím Hồng hoàng gia cho chất nghệ
            progressFill.style.background = "linear-gradient(90deg, #a855f7, #ec4899)";
            exportVideoBtn.disabled = true;
            exportVideoBtn.style.opacity = "0.5";

            let percent = 0;
            const renderInterval = setInterval(() => {
                percent += 2;
                progressFill.style.width = percent + "%";
                statusText.innerText = `🎬 Đang tiến hành mã hóa & ghép cứng phụ đề vào luồng video... ${percent}%`;
                
                if(percent >= 100) {
                    clearInterval(renderInterval);
                    statusText.innerText = "✅ Đã render hoàn tất! Đọc file xuất xưởng xuống thiết bị...";
                    
                    // Lấy file người dùng up lên để xuất trả ngược lại kèm tên vietsub
                    const file = fileInput.files[0];
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(file);
                    
                    const originalName = file.name;
                    const dotIndex = originalName.lastIndexOf('.');
                    const newName = dotIndex !== -1 
                        ? originalName.substring(0, dotIndex) + "_vietsub" + originalName.substring(dotIndex)
                        : originalName + "_vietsub.mp4";
                        
                    link.download = newName;
                    link.click();

                    exportVideoBtn.disabled = false;
                    exportVideoBtn.style.opacity = "1";
                }
            }, 40);
        });
    </script>
</body>
</html>
